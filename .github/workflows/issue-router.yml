name: Issue Router
on:
  issues:
    types: [opened, edited, labeled]
permissions:
  issues: write
jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update router prompt comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const ROUTER_MARKER = "<!-- openbook-issue-router -->";
            const body = [
              ROUTER_MARKER,
              "@issue-router",
              "Route this issue using the OpenBook Author handoff contract.",
              `Issue #${issue.number}`,
              `Title: ${issue.title}`,
              `Labels: ${issue.labels.map(l => l.name).join(", ") || "none"}`,
              "Body:",
              issue.body || "No body provided."
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: issue.number,
              per_page: 100
            });

            const existing = comments.find(
              (comment) => comment.body && comment.body.includes(ROUTER_MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body
              });
            }
