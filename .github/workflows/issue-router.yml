name: Issue Router
on:
  issues:
    types: [labeled]
permissions:
  issues: write
jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Add router prompt comment
        uses: actions/github-script@v7
        with:
          script: |
            const triggerLabel = context.payload.label?.name;
            if (triggerLabel !== "router-ready") {
              core.info(`Ignoring labeled event for "${triggerLabel}".`);
              return;
            }

            const issue = context.payload.issue;
            const ROUTER_MARKER = "<!-- openbook-author:issue-router -->";

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: issue.number,
              per_page: 100
            });

            const alreadyRouted = comments.some(
              (comment) => comment.body && comment.body.includes(ROUTER_MARKER)
            );

            if (alreadyRouted) {
              core.info("Router comment already exists — skipping.");
              return;
            }

            const body = [
              ROUTER_MARKER,
              "@issue-router",
              "Route this issue using the OpenBook Author handoff contract.",
              `Issue #${issue.number}`,
              `Title: ${issue.title}`,
              `Labels: ${issue.labels.filter(l => l.name !== "router-ready").map(l => l.name).join(", ") || "none"}`,
              "Body:",
              issue.body || "No body provided."
            ].join("\n");

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body
            });
