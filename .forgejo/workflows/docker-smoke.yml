# Forgejo Actions — homelab CI at http://192.168.12.115:3000
# Register act_runner with the `docker` label and Docker socket access.
# See docs/FORGEJO.md for full homelab setup.

name: Docker smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-test:
    runs-on: docker
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docker deploy smoke test
        run: npm run test:deploy
